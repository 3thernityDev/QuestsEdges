---
# Playbook Ansible pour deployer QuestsEdges API sur le VPS
# Usage: ansible-playbook ansible/deploy.yml -i "host," -u user -e "release_tag=v1.0.0"

- name: Deploy QuestsEdges API
  hosts: all
  vars:
    app_name: questsedges-api
    app_dir: /home/srvPod/QuestsEdges
    repo_url: https://github.com/3thernityDev/QuestsEdges.git
    container_name: api

  tasks:
    - name: Afficher la version deployee
      debug:
        msg: "Deploiement de la version {{ release_tag }}"


    - name: Copier l'archive de build sur le serveur
      copy:
        src: "questsedges-api-{{ release_tag }}.tar.gz"
        dest: "{{ app_dir }}/questsedges-api-{{ release_tag }}.tar.gz"
        mode: '0644'


    - name: Copier le fichier .env depuis le runner
      copy:
        content: "{{ lookup('env', 'PROD_ENV_FILE') }}"
        dest: "{{ app_dir }}/.env"
        owner: srvPod
        mode: '0600'

    - name: Verifier si le fichier .env existe
      stat:
        path: "{{ app_dir }}/.env"
      register: env_file

    - name: Avertir si .env manquant
      fail:
        msg: "Le fichier .env n'existe pas dans {{ app_dir }}. Veuillez le creer avant le deploiement."
      when: not env_file.stat.exists




    - name: Extraire le code compilé et les fichiers nécessaires
      unarchive:
        src: "{{ app_dir }}/questsedges-api-{{ release_tag }}.tar.gz"
        dest: "{{ app_dir }}"
        remote_src: yes
      become_user: srvPod


    - name: Installer les dépendances de production
      command: npm ci --omit=dev
      args:
        chdir: "{{ app_dir }}"
      become_user: srvPod

    - name: Lancer les conteneurs avec podman compose (prod)
      command: podman compose -f {{ app_dir }}/compose.prod.yml up -d
      become_user: srvPod

    - name: Attendre que l'API soit prete
      wait_for:
        port: 3000
        host: localhost
        delay: 5
        timeout: 60

    - name: Verifier le health check
      uri:
        url: http://localhost:3000/health
        method: GET
        status_code: 200
      register: health_check
      retries: 3
      delay: 5

    - name: Afficher le resultat du health check
      debug:
        msg: "API deployee avec succes - Status: {{ health_check.json.status }}"
